<!doctype html>
<html lang="en">

<head>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <script type="module" src="/main.js" defer></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.7/handlebars.min.js"></script>


</head>

<body style="padding: 30px;">

  <div class="flex flex-col space-y-4">

    <div>
      <input type="file" class="file-input file-input-bordered file-input-sm w-full max-w" />
    </div>

    <div>
      <input type="text" placeholder="Bind IP" class="input input-bordered input-sm w-48" />
    </div>

    <div>
      <div id="app"></div>
      <script id="entry-template" type="text/x-handlebars-template">
        {{#each protocol}}
          <div class="flex flex-row space-x-1">

            <div>
              <p class="label">{{ name }}</p>
            </div>

            <div>
              <input type="number" placeholder="{{ port }}" class="input input-sm input-bordered w-20" />
            </div>
           
            <div>
              <label class="btn btn-sm swap swap-rotate">
                <input type="checkbox" />
                <div class="swap-on">START</div>
                <div class="swap-off">STOP</div>
              </label>
            </div>
          </div>
        {{/each}}
      </script>
    </div>

    <textarea placeholder="Bio" class="textarea textarea-bordered textarea-lg w-full max-w"></textarea>

  </div>

  <script src="template.js"></script>


</body>

</html>
